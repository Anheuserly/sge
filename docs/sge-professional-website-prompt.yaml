project:
  name: "Shree Ganesh Enterprises (SGE)"
  category: "MEP, fire safety, plumbing, electrical, IBMS, e-security and AMC services"
  objective: "Build a professional company website that feels credible, operational, compliance-ready and human-made."
  primary_audience:
    - "Facility managers"
    - "Developers and builders"
    - "Hospitals, institutes, commercial and industrial clients"
    - "AMC and maintenance clients"

brand:
  position: "Established New Delhi MEP company with turnkey delivery from design to AMC."
  tone:
    - "Confident"
    - "Technical"
    - "Clear"
    - "Trustworthy"
    - "Not flashy or AI-generated"
  visual_direction:
    - "Use the real SGE logo from public/shreeganeshlogo.jpeg."
    - "Treat company profile and certificates as downloadable documents only."
    - "Do not show PDF page screenshots or company profile page images in the hero, homepage sections, projects page, clients page, or document cards."
    - "Use a light integrated MEP coverage board in the hero, not a dark service-desk dashboard."
    - "Use concise proof points, project/client names, document download cards, and app badges as visible design material."
    - "Keep layouts structured, businesslike and scannable."
    - "Prefer navy, red, white, muted green and controlled gold accents."
    - "Avoid decorative blobs, excessive gradients, fake stock imagery and oversized marketing cards."

content_sources:
  public_documents:
    - "public/documents/SGE PPT 2025.pdf"
    - "public/documents/2 SHREE GANESH GST CERTIFICATE (1).pdf"
    - "public/documents/3 PF CERTIFICATE.pdf"
    - "public/documents/4 ESI CERTIFICATE.pdf"
    - "public/documents/5 Udyam Registration Certificate.pdf"
  app_links:
    app_store: "https://apps.apple.com/in/app/amc-mep-24x7-service-app/id6756487144"
    google_play: "https://play.google.com/store/apps/details?id=com.mepsge.amcsge&pcampaignid=web_share"

site_requirements:
  homepage:
    - "First viewport must show the SGE name, real logo identity, primary service scope and a clean integrated MEP coverage board."
    - "Include direct calls to request a site survey and explore services."
    - "Show highlights: established 1997, design-to-AMC model, pan-India service reach and experience."
    - "Show core services, work methodology, major projects, client proof, sectors and document download links."
    - "Introduce AMC MEP 24x7 Service App with official-looking App Store and Google Play badges."
  services_page:
    - "List fire fighting, detection, extinguishers, suppression, electrical, plumbing, IBMS, design, architectural and AMC services."
    - "Keep service cards compact and technical, not promotional."
    - "Repeat app download block for AMC context."
  projects_page:
    - "Show sector coverage, selected project names and methodology."
    - "Do not show company profile preview images; link the profile only from document downloads."
  clients_page:
    - "Show client portfolio and registrations."
    - "Include text-only downloadable document cards for profile and compliance certificates."
  contact_page:
    - "Show address, phone, email, key contacts, service form and app download block."

design_checklist:
  layout:
    - "[ ] Header uses real logo and compact navigation."
    - "[ ] Hero communicates SGE clearly within first viewport without cramped or clipped right-side content."
    - "[ ] Hero coverage board stacks cleanly on mobile and fits inside the container on desktop."
    - "[ ] Sections are full-width bands or clean constrained layouts."
    - "[ ] Cards are only used for repeated items, forms and document previews."
    - "[ ] Mobile layout stacks cleanly without text overlap."
  credibility:
    - "[ ] Company profile and certificates are available as download cards only."
    - "[ ] No PDF page screenshots or profile preview images are visible on the website."
    - "[ ] Major projects and clients are easy to scan."
    - "[ ] Company age, service model and compliance proof are present."
  app_promotion:
    - "[ ] AMC MEP 24x7 Service App has App Store and Google Play links."
    - "[ ] Store badges are displayed without modification or distortion."
    - "[ ] App block is supportive, not louder than SGE brand."
  content_quality:
    - "[ ] Copy sounds like an Indian MEP company, not generic AI marketing."
    - "[ ] Claims are grounded in provided documents or existing company content."
    - "[ ] Avoid exaggerated language such as world-class, revolutionary or best ever."
  technical:
    - "[ ] Run npm run lint."
    - "[ ] Run npm run build."
    - "[ ] Start the local Next server and inspect desktop and mobile widths."
    - "[ ] Verify all document links open."
    - "[ ] Verify app links open in a new tab."

seo:
  primary_keywords:
    - "Shree Ganesh Enterprises"
    - "SGE"
    - "fire fighting system contractor"
    - "MEP contractor New Delhi"
    - "fire alarm and hydrant system"
    - "electrical plumbing AMC"
    - "AMC MEP 24x7 Service App"
  structured_data:
    - "Organization schema with address, phone numbers and sameAs websites."
    - "Use descriptive page titles and service-focused metadata."

acceptance_criteria:
  - "The website should look like a serious MEP company profile, not a starter template."
  - "The logo, company documents and app links must be visible and useful."
  - "The layout must remain clean on phone, tablet and desktop."
  - "The design must feel authored by the business, with restrained copy and real proof."
